name: CI

on:
  push:
    branches:
    - '**'
    tags:
    - 'v*'
    paths-ignore:
    - 'docs/**'
    - '**.md'
    - '**/.*.yml'
    - '.vscode/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.4']

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false

    - name: Set up PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # master
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, xml, ctype, json, tokenizer
        coverage: none

    - name: Install dependencies
      run: make install-dev
      working-directory: private-captcha

    - name: Lint code
      run: make lint
      working-directory: private-captcha

    - name: Analyze code
      run: make analyze
      working-directory: private-captcha

    - name: Check WordPress coding standards
      run: make wpcs
      working-directory: private-captcha

  package:
    runs-on: ubuntu-latest
    needs: lint
    if: success()

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false

    - name: Set up PHP
      uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # master
      with:
        coverage: none
        tools: wp-cli
      env:
        update: true

    - name: Set Composer root version from tag
      if: github.ref_type == 'tag'
      run: |
        # Normalize tag for Composer: convert trailing -N to .N (e.g. v1.0.14-3 → v1.0.14.3)
        # because Composer rejects bare numbers after a hyphen.
        VERSION=$(echo "${GITHUB_REF_NAME}" | sed -E 's/-([0-9]+)$/.\1/')
        echo "COMPOSER_ROOT_VERSION=${VERSION}" >> "$GITHUB_ENV"

    - name: Install dependencies
      run: make install
      working-directory: private-captcha

    - name: Run plugin check
      uses: wordpress/plugin-check-action@6f5a57e173c065a394b78688f75df543e4011902 # v1.1.5
      with:
        build-dir: './private-captcha'
        exclude-files: |
          .distignore

    - name: Install latest version of dist-archive-command
      run: |
        composer require --dev wp-cli/dist-archive-command

    - name: Build plugin
      run: |
        wp dist-archive ./private-captcha ./private-captcha.zip

    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: wp-plugin
        path: private-captcha.zip
        retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: package
    if: success() && github.ref_type == 'tag'
    environment: GitHub release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wp-plugin

      - name: Display downloaded files
        run: ls -R .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}" \
            private-captcha.zip
