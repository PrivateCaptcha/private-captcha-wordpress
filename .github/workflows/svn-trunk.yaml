name: Push to SVN trunk

on:
  workflow_dispatch:

env:
  PLUGIN_SLUG: private-captcha
  SVN_URL: https://plugins.svn.wordpress.org/private-captcha

jobs:
  deploy:
    name: Deploy to WordPress SVN
    runs-on: ubuntu-latest
    environment: WordPress release
    permissions:
      contents: read
      actions: read

    if: github.ref_type == 'tag'

    steps:
      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploying version: ${VERSION}"

      - name: Download build artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow ci.yaml \
            --commit "${{ github.sha }}" \
            --status success \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful CI workflow run found for commit ${{ github.sha }}"
            exit 1
          fi

          echo "Downloading build artifact from CI run ${RUN_ID}..."
          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --name wp-plugin \
            --dir .

          ls -la ./*.zip

      - name: Extract plugin files
        run: |
          mkdir -p /tmp/plugin-release
          unzip -o "${PLUGIN_SLUG}.zip" -d /tmp/plugin-release
          echo "Extracted contents:"
          ls -la /tmp/plugin-release/
          # The zip contains a root folder (private-captcha/), move contents up
          PLUGIN_DIR=$(find /tmp/plugin-release -mindepth 1 -maxdepth 1 -type d | head -1)
          echo "Plugin directory: ${PLUGIN_DIR}"
          if [ -z "${PLUGIN_DIR}" ]; then
            echo "::error::No plugin directory found in ZIP archive"
            exit 1
          fi
          mv -v "${PLUGIN_DIR}" /tmp/plugin-files
          echo "Plugin files to deploy:"
          find /tmp/plugin-files -type f | head -50

      - name: Install SVN
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - name: Checkout SVN repository
        run: |
          svn checkout "${SVN_URL}/" /tmp/svn-repo \
            --depth immediates
          svn update /tmp/svn-repo/trunk --set-depth infinity
          svn update /tmp/svn-repo/tags --set-depth immediates
          echo "SVN trunk contents before update:"
          ls -la /tmp/svn-repo/trunk/ || echo "(empty)"

      - name: Sync plugin files to trunk
        run: |
          # Remove existing trunk contents (but keep the directory)
          if [ -d /tmp/svn-repo/trunk ]; then
            find /tmp/svn-repo/trunk -mindepth 1 -not -name '.svn' -not -path '*/.svn/*' -delete 2>/dev/null || true
          fi

          # Copy new plugin files to trunk
          cp -a /tmp/plugin-files/. /tmp/svn-repo/trunk/

          echo "Updated trunk contents:"
          find /tmp/svn-repo/trunk -type f | head -50

      - name: Prepare SVN changelist
        working-directory: /tmp/svn-repo
        run: |
          # Schedule new files for addition
          svn add --force trunk/

          # Remove files from SVN that are no longer in the plugin
          svn status trunk/ | grep '^!' | awk '{print $2}' | xargs -r svn delete

          echo "SVN status for trunk:"
          svn status trunk/

      - name: Commit to SVN
        working-directory: /tmp/svn-repo
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
        run: |
          if [ "${DRY_RUN}" = "false" ]; then
            echo "Committing changes to WordPress.org SVN..."
            svn commit \
              --username "${SVN_USERNAME}" \
              --password "${SVN_PASSWORD}" \
              --no-auth-cache \
              --non-interactive \
              -m "Release ${{ steps.version.outputs.version }}"
            echo "Successfully deployed version ${{ steps.version.outputs.version }} to WordPress.org"
          else
            echo "::notice::DRY RUN mode — skipping SVN commit. Set DRY_RUN=false in the 'WordPress release' environment to enable deployment."
            echo "The following changes would be committed:"
            svn status
            svn diff --summarize
          fi
